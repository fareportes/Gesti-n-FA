<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Gerencial - Zona FA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #28a745; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        input, select { display: block; width: 250px; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-login { width: 270px; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #dashboard { display: none; padding: 20px; max-width: 1000px; margin: auto; background: white; margin-top: 20px; border-radius: 8px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; padding: 15px; background: #e9ecef; flex-wrap: wrap; align-items: center; }
        .tabs { display: flex; cursor: pointer; border-bottom: 2px solid #28a745; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #eee; margin-right: 5px; border-radius: 5px 5px 0 0; }
        .tab.active { background: #28a745; color: white; }
        .content { display: none; }
        .content.active { display: block; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #ddd; border-left: 1px solid #ddd; }
        .cal-day { border-right: 1px solid #ddd; border-bottom: 1px solid #ddd; min-height: 80px; padding: 5px; font-size: 0.7em; background: #fff; }
        .cal-header-day { background: #28a745; color: white; text-align: center; padding: 5px; font-weight: bold; }
        .task-tag { color: white; padding: 2px 4px; border-radius: 3px; display: block; margin-top: 2px; font-weight: bold; font-size: 0.8em; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #28a745; color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: #28a745;">Acceso Zona FA</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-login" onclick="verificarLogin()">Ingresar</button>
    </div>
</div>

<div id="dashboard">
    <h2>Gestión FA - <span id="userDisplay"></span></h2>
    <div class="controls">
        <div id="filtroSenior" style="display:none; gap:10px;">
            <select id="filtroSucursal" onchange="renderCalendar()"></select>
        </div>
        <select id="filtroMes" onchange="renderCalendar()">
            <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option>
            <option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option>
            <option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option>
            <option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
        </select>
        <button onclick="location.reload()" style="background:#dc3545; color:white; border:none; padding:10px; cursor:pointer;">Cerrar Sesión</button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab(event, 'calendario')">Calendario</div>
        <div class="tab" onclick="showTab(event, 'programacion')">Programación</div>
    </div>

    <div id="calendario" class="content active"><div id="calendarGrid" class="calendar-grid"></div></div>

    <div id="programacion" class="content">
        <h3>Nueva Actividad</h3>
        <select id="sucursalForm"></select>
        <input type="date" id="fechaAct">
        <input type="text" id="eventoAct" placeholder="Evento">
        <select id="estadoAct"><option value="Generada">Generada</option><option value="En curso">En curso</option><option value="Realizada">Realizada</option></select>
        <button type="button" onclick="agregarActividad()" style="background:#28a745; color:white; border:none; padding:10px; cursor:pointer;">Agregar</button>
        <table id="tablaProgramacion"><thead><tr><th>Sucursal</th><th>Fecha</th><th>Evento</th><th>Estado</th></tr></thead><tbody></tbody></table>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw29uDOhXYW6EmbCc0i7ovfJ2rSp_ctJr7DLpvHrx6Xmlv8dFMBUQDVnTf1kV3XEK4qWQ/exec";
    let state = { actividades: [] }; // Estado centralizado[cite: 1]
    
    const sucursales = ["FA13", "FA24", "FA42", "FA44", "FA49", "FA59", "FA66", "FA103", "FA107"];

    let usuarioActual = "", esSenior = false;

    async function cargarDatos() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            state.actividades = data.actividades || [];
            renderCalendar();
            renderTabla();
        } catch(e) { console.error("Error al cargar:", e); }
    }

    async function agregarActividad() {
        const act = { 
            sucursal: document.getElementById("sucursalForm").value, 
            fecha: document.getElementById("fechaAct").value, 
            evento: document.getElementById("eventoAct").value, 
            estado: document.getElementById("estadoAct").value 
        };
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(act)
            });

            // No podemos leer la respuesta (limitación de CORS de Apps Script),
            // así que esperamos un momento y confirmamos consultando los datos de nuevo
            await new Promise(r => setTimeout(r, 1500));
            await cargarDatos();

            const seRegistro = state.actividades.some(a =>
                a.sucursal === act.sucursal && String(a.fecha).split('T')[0] === act.fecha && a.evento === act.evento
            );

            if (seRegistro) {
                alert("Actividad registrada correctamente");
            } else {
                alert("No se pudo confirmar el registro. Revisa la hoja de cálculo o el registro de ejecución en Apps Script.");
            }
        } catch (err) {
            alert("Error de conexión: " + err.message);
            console.error("Error fetch:", err);
        }
    }

    // Sincronización automática de estado cada 15 segundos[cite: 1]
    setInterval(cargarDatos, 15000); 

    async function verificarLogin() {
        const u = document.getElementById("user").value.trim();
        const p = document.getElementById("pass").value.trim();
        const btn = document.querySelector(".btn-login");
        btn.disabled = true;
        btn.innerText = "Verificando...";

        try {
            const resp = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'login', usuario: u, pass: p })
            });
            const result = await resp.json();

            if (result.status === 'success') {
                usuarioActual = u; esSenior = (u === "Senior");
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
                document.getElementById("userDisplay").innerText = u;

                if(esSenior) {
                    document.getElementById("filtroSenior").style.display = "flex";
                    document.getElementById("filtroSucursal").innerHTML = '<option value="Todos">Todas las FA</option>' + sucursales.map(s => `<option value="${s}">${s}</option>`).join('');
                    document.getElementById("sucursalForm").innerHTML = sucursales.map(s => `<option value="${s}">${s}</option>`).join('');
                } else {
                    document.getElementById("sucursalForm").innerHTML = `<option value="${u}">${u}</option>`;
                    document.getElementById("sucursalForm").disabled = true;
                }
                document.getElementById("filtroMes").value = new Date().getMonth();
                cargarDatos();
            } else {
                alert("Usuario o contraseña incorrectos");
            }
        } catch (err) {
            alert("Error de conexión: " + err.message);
            console.error("Error login:", err);
        } finally {
            btn.disabled = false;
            btn.innerText = "Ingresar";
        }
    }

    function renderCalendar() {
        const grid = document.getElementById("calendarGrid");
        grid.innerHTML = "";
        ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"].forEach(d => grid.innerHTML += `<div class="cal-header-day">${d}</div>`);
        const mes = parseInt(document.getElementById("filtroMes").value);
        const primerDia = new Date(2026, mes, 1).getDay();
        const diasEnMes = new Date(2026, mes + 1, 0).getDate();
        const filtroSuc = esSenior ? document.getElementById("filtroSucursal").value : usuarioActual;
        
        for(let i=0; i<primerDia; i++) grid.innerHTML += `<div class="cal-day" style="background:#f9f9f9"></div>`;
        for(let i=1; i<=diasEnMes; i++) {
            let div = document.createElement('div'); div.className = 'cal-day'; div.innerHTML = `<strong>${i}</strong>`;
            state.actividades.forEach(a => {
                const fechaStr = String(a.fecha).split('T')[0]; // soporta "2026-07-19" y "2026-07-19T06:00:00.000Z"
                let [y, m, d] = fechaStr.split('-').map(Number);
                if ((m - 1) === mes && d === i && (filtroSuc === "Todos" || a.sucursal === filtroSuc)) {
                    div.innerHTML += `<span class="task-tag" style="background:${a.estado === 'Generada' ? '#17a2b8' : '#28a745'}">${a.sucursal}: ${a.evento}</span>`;
                }
            });
            grid.appendChild(div);
        }
    }

    const ESTADOS = ["Generada", "En curso", "En proceso", "Completado", "Realizada"];

    function renderTabla() {
        const tbody = document.querySelector("#tablaProgramacion tbody");
        tbody.innerHTML = state.actividades.map(a => `
            <tr>
                <td>${a.sucursal}</td>
                <td>${String(a.fecha).split('T')[0]}</td>
                <td>${a.evento}</td>
                <td>
                    <select onchange="actualizarEstado(${a.fila}, this.value)">
                        ${ESTADOS.map(est => `<option value="${est}" ${est === a.estado ? 'selected' : ''}>${est}</option>`).join('')}
                    </select>
                </td>
            </tr>`).join('');
    }

    async function actualizarEstado(fila, nuevoEstado) {
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'actualizarEstado', fila, nuevoEstado })
            });
            await new Promise(r => setTimeout(r, 1000));
            await cargarDatos();
        } catch (err) {
            alert("Error al actualizar estado: " + err.message);
            console.error("Error actualizarEstado:", err);
        }
    }

    function showTab(e, id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
